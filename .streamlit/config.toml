# ════════════════════════════════════════════════════════════════════════════
# StockAI - Streamlit Configuration
# Premium Dark Theme for Agent-Based Market Simulation Laboratory
# ════════════════════════════════════════════════════════════════════════════

[server]
headless = true
enableXsrfProtection = true
enableStaticServing = false
runOnSave = true
address = "127.0.0.1"
port = 8501

[browser]
gatherUsageStats = false

[theme]
# Primary accent color - vibrant green for growth/positive
primaryColor = "#22C55E"

# Background colors - deep dark theme
backgroundColor = "#000000"
secondaryBackgroundColor = "#0F172A"

# Text colors
textColor = "#F8FAFC"

# Font - modern, clean
font = "sans serif"

[client]
# Hide toolbar in production
showSidebarNavigation = false
toolbarMode = "minimal"
